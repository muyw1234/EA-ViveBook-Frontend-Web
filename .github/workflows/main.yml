# This is a basic workflow to help you get started with Actions

name: CI to Docker Hub with cache

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the master branch
  push:
    branches:
      - 'main'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.head_commit.message, 'v')
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate public Web configuration
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_SOCKET_URL: ${{ vars.VITE_SOCKET_URL }}
        run: |
          test -n "$VITE_API_URL" || (echo "Missing repository variable VITE_API_URL" && exit 1)
          test -n "$VITE_SOCKET_URL" || (echo "Missing repository variable VITE_SOCKET_URL" && exit 1)
          case "$VITE_API_URL" in
            *localhost*|*127.0.0.1*) echo "VITE_API_URL cannot point to localhost" && exit 1 ;;
          esac
          case "$VITE_SOCKET_URL" in
            *localhost*|*127.0.0.1*) echo "VITE_SOCKET_URL cannot point to localhost" && exit 1 ;;
          esac

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: ./
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/vivebook-web-ea:latest
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
            VITE_SOCKET_URL=${{ vars.VITE_SOCKET_URL }}

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}
